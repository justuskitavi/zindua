name : Zindua pipeline

on:
  schedule:
  - cron : '*/5 * * * *'

  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on : ubuntu-latest

    steps:
      - name : Trigger ingest
        run : |
          curl -f -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}"/api/cron/ingest

      - name : Wait for ingestion to complete
        run : sleep 10

      - name : Trigger translation
        run : |
          curl -f -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}"/api/translate

      - name : Wait for translation to complete
        run : sleep 30

      - name : Trigger relay
        run : |
          curl -f -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}"/api/relay
