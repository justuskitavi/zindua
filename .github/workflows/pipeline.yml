name : Zindua pipeline

on:
  schedule:
  - cron: '*/5 * * * *'

  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on : ubuntu-latest

    steps:
      - name: Trigger ingest
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/api/cron/ingest")
          echo "$response"
          http_code=$(echo "$response" | tail -1)
          if [ "$http_code" != "200" ]; then
            echo "Failed with status $http_code"
            exit 1
          fi

      - name: Wait for ingestion to complete
        run: sleep 15

      - name: Trigger translation
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/api/translate")
          echo "$response"
          http_code=$(echo "$response" | tail -1)
          if [ "$http_code" != "200" ]; then
            echo "Failed with status $http_code"
            exit 1
          fi

      - name: Wait for translation to complete
        run: sleep 30

      - name: Trigger relay
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/api/relay")
          echo "$response"
          http_code=$(echo "$response" | tail -1)
          if [ "$http_code" != "200" ]; then
            echo "Failed with status $http_code"
            exit 1
          fi